name: Build Mocker ISO

# Builds the closure-baked Mocker appliance ISO on an aarch64 Linux runner.
#
# Triggers:
#   - push to main     -> build smoke test + uploaded artifact
#   - pull_request     -> build smoke test + uploaded artifact
#   - workflow_dispatch -> manual build + uploaded artifact
#   - tag push "v*"    -> build + attach ISO and sha256 to a GitHub Release

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/**"
      - "modules/**"
      - ".github/workflows/build-iso.yml"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/**"
      - "modules/**"
      - ".github/workflows/build-iso.yml"
  workflow_dispatch:

jobs:
  build:
    # Public GitHub repos currently have ARM Linux hosted runners. Building the
    # ISO on Linux avoids darwin.linux-builder and matches the package system:
    # .#packages.aarch64-linux.mocker-mac-iso
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write # needed by softprops/action-gh-release on tag pushes
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Evaluate flake
        run: |
          set -euo pipefail
          nix flake check --no-build --all-systems --print-build-logs

      - name: Build mocker-mac ISO
        run: |
          set -euo pipefail
          nix build --print-build-logs .#packages.aarch64-linux.mocker-mac-iso

      - name: Locate ISO
        id: iso
        run: |
          set -euo pipefail
          iso="$(find result/iso -maxdepth 1 -name '*.iso' -print -quit)"
          if [[ -z "$iso" ]]; then
            echo "No ISO found under result/iso" >&2
            exit 1
          fi

          out="mocker-mac.iso"
          cp -L "$iso" "$out"
          sha256sum "$out" | tee "$out.sha256"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          echo "sha=$out.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: mocker-mac-iso
          path: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.sha }}
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.iso.outputs.sha }}
          fail_on_unmatched_files: true
